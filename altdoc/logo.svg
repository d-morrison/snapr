<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 181 209" width="181" height="209">
  <defs>
    <!-- Hex background gradient: deep crimson to near-black -->
    <linearGradient id="bg" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#9A1818"/>
      <stop offset="100%" stop-color="#580000"/>
    </linearGradient>
    <!-- Fish body gradient: darker top, lighter belly -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C42820"/>
      <stop offset="50%"  stop-color="#DC3A24"/>
      <stop offset="100%" stop-color="#F06040"/>
    </linearGradient>
  </defs>

  <!-- ── Hexagon (pointy-top, R=98, centre 90.5 104.5) ── -->
  <polygon
    points="90.5,6.5 175.4,55.5 175.4,153.5 90.5,202.5 5.6,153.5 5.6,55.5"
    fill="url(#bg)" stroke="#2A0000" stroke-width="4"/>

  <!-- ═══════════════════════════════════════════════
       FISH  (head left, tail right, centre ≈ 88,94)
       ═══════════════════════════════════════════════ -->

  <!-- Pectoral fin – drawn BEHIND the body -->
  <path d="M 64,91
           C 60,106 63,120 71,123
           C 69,112 68,101 70,93
           Z"
        fill="#A81818"/>

  <!-- Dorsal fin (tall, spiny) -->
  <path d="M 63,69
           C 70,58 81,50 91,48
           C 101,46 113,50 122,57
           C 129,63 133,71 134,77
           C 118,72 100,71 83,71
           C 74,70 68,69 63,69
           Z"
        fill="#C02020"/>
  <!-- Dorsal fin spines -->
  <line x1="65"  y1="69" x2="70"  y2="57" stroke="#8A1212" stroke-width="1.5"/>
  <line x1="76"  y1="68" x2="82"  y2="52" stroke="#8A1212" stroke-width="1.5"/>
  <line x1="88"  y1="67" x2="93"  y2="48" stroke="#8A1212" stroke-width="1.5"/>
  <line x1="101" y1="67" x2="106" y2="50" stroke="#8A1212" stroke-width="1.5"/>
  <line x1="115" y1="70" x2="120" y2="58" stroke="#8A1212" stroke-width="1.5"/>
  <line x1="126" y1="74" x2="130" y2="64" stroke="#8A1212" stroke-width="1.5"/>

  <!-- Anal fin -->
  <path d="M 101,119
           C 108,133 110,142 106,144
           C 100,141 95,132 94,122
           Z"
        fill="#B82020"/>

  <!-- ── Main fish body ── -->
  <!-- Clockwise from snout tip:
       snout → head top → back → upper caudal peduncle → upper tail fork
       → tail notch → lower tail fork → lower caudal → belly → chin → snout -->
  <path d="M 26,93
           C 31,76 49,67 67,67
           C 83,67 109,69 130,78
           C 140,82 147,87 149,91
           L 163,73
           C 157,88 155,94 151,96
           C 155,99 157,105 163,119
           L 149,104
           C 147,108 140,113 128,118
           C 107,126 83,127 67,125
           C 49,123 31,114 26,101
           Z"
        fill="url(#bodyGrad)"/>

  <!-- Belly highlight -->
  <path d="M 44,105
           C 56,121 76,126 96,126
           C 116,126 136,119 148,108
           C 131,117 109,123 91,123
           C 71,123 53,117 44,105
           Z"
        fill="#F87060" opacity="0.5"/>

  <!-- Gill cover arc -->
  <path d="M 62,74 C 67,87 67,106 62,119"
        stroke="#A01515" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Lateral line (dashed, subtle) -->
  <path d="M 69,93 C 103,92 131,92 147,93"
        stroke="#B81E18" stroke-width="1.5" fill="none"
        stroke-dasharray="5,3.5" opacity="0.45"/>

  <!-- ── Eye ── -->
  <circle cx="45" cy="88" r="9"   fill="white"/>
  <circle cx="46" cy="88" r="6.5" fill="#160606"/>
  <circle cx="48" cy="86" r="2.2" fill="white"/>

  <!-- ── Mouth ── -->
  <path d="M 26,89 C 32,85 40,85 46,87"
        stroke="#7A0E0E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 26,97 C 32,101 40,101 46,99"
        stroke="#7A0E0E" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ── Scale arcs (subtle crescent pattern) ── -->
  <g opacity="0.18" stroke="#7A0E0E" stroke-width="1.2" fill="none">
    <path d="M  80,71 Q  84,77  80,83"/>
    <path d="M  93,70 Q  97,76  93,82"/>
    <path d="M 106,72 Q 110,78 106,84"/>
    <path d="M 120,75 Q 124,81 120,87"/>
    <path d="M 133,80 Q 137,86 133,92"/>
    <path d="M  74,83 Q  78,89  74,95"/>
    <path d="M  87,82 Q  91,88  87,94"/>
    <path d="M 100,83 Q 104,89 100,95"/>
    <path d="M 114,86 Q 118,92 114,98"/>
    <path d="M 127,90 Q 131,96 127,102"/>
  </g>

  <!-- ── Package name ── -->
  <text x="90.5" y="154"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="26"
        font-weight="bold"
        fill="white"
        letter-spacing="4">snapr</text>
</svg>
